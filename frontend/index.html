<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ 智能功耗监控系统</title>
  <!-- 引入 Google Fonts 极简高清晰度字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  
  <style>
    /* Stripe/Vercel 风格极简变量系统 */
    :root {
      color-scheme: light;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --md-sys-color-primary: #0284c7; /* 钢蓝 */
      --md-sys-color-primary-container: #e0f2fe;
      --md-sys-color-on-primary-container: #0369a1;
      --md-sys-color-secondary: #475569;
      --md-sys-color-secondary-container: #f1f5f9;
      --md-sys-color-surface: #ffffff;
      --md-sys-color-on-surface: #0f172a; /*  slate-900 */
      --md-sys-color-surface-variant: #f8fafc; /* slate-50 */
      --md-sys-color-on-surface-variant: #64748b; /* slate-500 */
      --md-sys-color-outline: #cbd5e1; /* slate-300 */
      --md-sys-color-outline-variant: #e2e8f0; /* slate-200 */
      
      --md-sys-color-success: #10b981; /* 翡翠绿 */
      --md-sys-color-success-container: #d1fae5;
      --md-sys-color-warning: #f59e0b; /* 琥珀黄 */
      --md-sys-color-warning-container: #fef3c7;
      --md-sys-color-error: #ef4444; /* 珊瑚红 */
      --md-sys-color-error-container: #fee2e2;
      
      --surface-bg: #ffffff;
      --border-color: #e2e8f0;
      --bg: #f8fafc;
      
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      
      --shadow-1: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
      --shadow-2: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      
      --hm1: #d1fae5;
      --hm2: #fef3c7;
      --hm3: #ffe4e6;
      --hm4: #fca5a5;
    }
    
    [data-theme="dark"] {
      color-scheme: dark;
      --md-sys-color-primary: #38bdf8;
      --md-sys-color-primary-container: #0c4a6e;
      --md-sys-color-on-primary-container: #e0f2fe;
      --md-sys-color-secondary: #94a3b8;
      --md-sys-color-secondary-container: #1e293b;
      --md-sys-color-surface: #0f172a; /* slate-900 */
      --md-sys-color-on-surface: #f8fafc; /* slate-50 */
      --md-sys-color-surface-variant: #1e293b; /* slate-800 */
      --md-sys-color-on-surface-variant: #94a3b8; /* slate-400 */
      --md-sys-color-outline: #334155; /* slate-700 */
      --md-sys-color-outline-variant: #1e293b;
      
      --md-sys-color-success: #34d399;
      --md-sys-color-success-container: #064e3b;
      --md-sys-color-warning: #fbbf24;
      --md-sys-color-warning-container: #78350f;
      --md-sys-color-error: #f87171;
      --md-sys-color-error-container: #7f1d1d;
      
      --surface-bg: #1e293b;
      --border-color: #334155;
      --bg: #0f172a;
      
      --shadow-1: 0 1px 3px 0 rgba(0, 0, 0, 0.25);
      --shadow-2: 0 4px 6px -1px rgba(0, 0, 0, 0.35);
      
      --hm1: #064e3b;
      --hm2: #78350f;
      --hm3: #4c0519;
      --hm4: #9f1239;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--md-sys-color-on-surface);
      font-family: var(--font-sans);
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }
    
    .font-mono {
      font-family: var(--font-mono);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 16px 24px;
    }
    
    /* 顶栏 App Bar */
    .top-app-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      margin: -12px -16px 16px -16px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-bg);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.03);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    
    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      background: var(--md-sys-color-primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
    }
    
    .brand h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--md-sys-color-on-surface);
    }
    
    .brand p {
      font-size: 0.72rem;
      color: var(--md-sys-color-on-surface-variant);
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .clock {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--border-color);
    }
    
    .refresh-toggle {
      border: 1px solid var(--border-color);
      cursor: pointer;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-size: 0.78rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }
    
    .refresh-toggle:hover {
      background: var(--md-sys-color-surface-variant);
    }
    
    .refresh-toggle.paused {
      background: var(--md-sys-color-error-container);
      color: var(--md-sys-color-error);
    }
    
    /* 选项卡及控制面板 */
    .control-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    
    .device-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    
    .device-tabs::-webkit-scrollbar {
      display: none;
    }
    
    .device-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-1);
      transition: all 0.15s ease;
    }
    
    .device-tab:hover {
      border-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-surface);
    }
    
    .device-tab.active {
      background: var(--md-sys-color-primary);
      color: white;
      border-color: var(--md-sys-color-primary);
    }
    
    .live-dot-flat {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--md-sys-color-success);
      display: inline-block;
    }
    
    .live-dot-flat.offline {
      background: var(--md-sys-color-outline);
    }
    
    .segmented {
      display: inline-flex;
      gap: 1px;
      padding: 2px;
      border-radius: var(--radius-sm);
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--border-color);
    }
    
    .segmented button {
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-xs);
      color: var(--md-sys-color-on-surface-variant);
      background: transparent;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.1s ease;
    }
    
    .segmented button.active {
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      box-shadow: var(--shadow-1);
    }
    
    .range-shell {
      padding: 3px;
      border-radius: var(--radius-sm);
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-1);
    }
    
    .range-bar {
      display: flex;
      gap: 1px;
    }
    
    .range-btn {
      padding: 5px 10px;
      border-radius: var(--radius-xs);
      background: transparent;
      border: none;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .range-btn:hover {
      background: var(--md-sys-color-surface-variant);
      color: var(--md-sys-color-on-surface);
    }
    
    .range-btn.active {
      background: var(--md-sys-color-primary);
      color: white;
    }
    
    .custom-range {
      display: none;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
    }
    
    .custom-range.show {
      display: flex;
    }
    
    .custom-range input {
      height: 28px;
      padding: 0 8px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-color);
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: var(--font-sans);
      font-size: 0.78rem;
      outline: none;
    }
    
    .apply-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-xs);
      border: none;
      background: var(--md-sys-color-primary);
      color: white;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* 看板基本组件 (Stripe 扁平风格) */
    .card, .hero-flat-main, .hero-flat-side, .stat-card, .insight-card {
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      box-shadow: var(--shadow-1);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    
    .card:hover, .stat-card:hover, .insight-card:hover {
      border-color: var(--md-sys-color-primary);
    }
    
    /* 1. 扁平设备数据概览 */
    .hero-flat {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .hero-flat-main {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .hero-flat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    
    .hero-flat-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .hero-flat-title-row h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--md-sys-color-on-surface);
    }
    
    .hero-flat-time {
      font-size: 0.72rem;
      color: var(--md-sys-color-on-surface-variant);
      font-family: var(--font-mono);
    }
    
    .hero-flat-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .flat-metric-item {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      padding-right: 8px;
    }
    
    .flat-metric-item:last-child {
      border-right: none;
    }
    
    .flat-metric-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 2px;
    }
    
    .flat-metric-val {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--md-sys-color-on-surface);
    }
    
    .flat-metric-val .unit {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
    }
    
    .flat-metric-sub {
      font-size: 0.68rem;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 2px;
    }
    
    .hero-flat-side {
      display: flex;
      flex-direction: column;
    }
    
    .side-title {
      font-size: 0.85rem;
      font-weight: 700;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    
    .side-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .side-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }
    
    .side-row .lbl {
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
    }
    
    .side-row .val {
      font-weight: 700;
    }
    
    .badge-flat {
      padding: 1px 6px;
      border-radius: var(--radius-xs);
      font-size: 0.68rem;
      font-weight: 600;
    }
    
    .badge-flat.ok { background: var(--md-sys-color-success-container); color: var(--md-sys-color-success); }
    .badge-flat.warn { background: var(--md-sys-color-warning-container); color: var(--md-sys-color-warning); }
    .badge-flat.error { background: var(--md-sys-color-error-container); color: var(--md-sys-color-error); }
    .status-switch-flat.on { color: var(--md-sys-color-success); }
    .status-switch-flat.off { color: var(--md-sys-color-on-surface-variant); }
    
    /* 2. 统计面板网格 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .stat-card {
      min-height: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .stat-card.accent {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-color: transparent;
    }
    
    .stat-card.warning {
      background: var(--md-sys-color-warning-container);
      color: var(--md-sys-color-warning);
      border-color: transparent;
    }
    
    .stat-card.success {
      background: var(--md-sys-color-success-container);
      color: var(--md-sys-color-success);
      border-color: transparent;
    }
    
    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
    }
    
    .stat-card.accent .stat-label {
      color: var(--md-sys-color-on-primary-container);
    }
    .stat-card.warning .stat-label {
      color: var(--md-sys-color-warning);
    }
    .stat-card.success .stat-label {
      color: var(--md-sys-color-success);
    }
    
    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.1;
      margin: 2px 0;
      color: var(--md-sys-color-on-surface);
    }
    
    .stat-card.accent .stat-value {
      color: var(--md-sys-color-on-primary-container);
    }
    
    .stat-unit {
      font-size: 0.68rem;
      font-weight: 600;
      margin-left: 2px;
    }
    
    .stat-foot {
      font-size: 0.65rem;
      color: var(--md-sys-color-on-surface-variant);
    }
    
    .stat-card.accent .stat-foot {
      color: var(--md-sys-color-on-primary-container);
      opacity: 0.8;
    }
    
    /* 3. 洞察面板网格 */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .insight-card {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .insight-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
    }
    
    .insight-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--md-sys-color-on-surface);
      margin: 4px 0;
    }
    
    .insight-value .unit {
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 2px;
    }
    
    .insight-caption {
      font-size: 0.68rem;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.3;
    }
    
    .meter {
      height: 6px;
      border-radius: var(--radius-xs);
      background: var(--md-sys-color-outline-variant);
      overflow: hidden;
      margin: 4px 0;
    }
    
    .meter i {
      display: block;
      height: 100%;
      background: var(--md-sys-color-primary);
    }
    
    /* 4. 双栏图表与卡片布局 */
    .section-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 12px;
    }
    
    .section-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    
    .card-title-main {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--md-sys-color-on-surface);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      font-size: 0.68rem;
      font-weight: 600;
      background: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-secondary);
      border: 1px solid var(--border-color);
    }
    
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 220px;
      margin-top: 4px;
    }
    
    /* 峰值分析与电费面板 */
    .peak-active-card {
      background: var(--md-sys-color-error-container);
      border-color: rgba(186, 26, 26, 0.15);
      color: var(--md-sys-color-error);
    }
    
    .peak-badge {
      background: var(--md-sys-color-error);
      color: white;
      border: none;
    }
    
    .peak-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--md-sys-color-error);
      margin: 4px 0;
    }
    
    .peak-caption {
      color: var(--md-sys-color-error);
      opacity: 0.85;
      font-size: 0.68rem;
      line-height: 1.4;
    }
    
    .cost-big {
      padding: 2px 0 10px;
    }
    
    .cost-label {
      font-size: 0.72rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .cost-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--md-sys-color-primary);
      margin-top: 2px;
    }
    
    .cost-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    
    .cost-item {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }
    
    .cost-item .cost-value {
      font-size: 0.95rem;
      color: var(--md-sys-color-on-surface);
      margin-top: 2px;
    }
    
    .standby-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 4px 0;
    }
    
    .standby-val {
      font-size: 1.3rem;
      color: var(--md-sys-color-warning);
    }
    
    .standby-bar {
      height: 6px;
      border-radius: var(--radius-xs);
      background: var(--md-sys-color-outline-variant);
      overflow: hidden;
      margin: 6px 0 10px;
      border: 1px solid var(--border-color);
    }
    
    .standby-fill {
      height: 100%;
      background: var(--md-sys-color-warning);
    }
    
    /* 热力图 */
    .heatmap-container {
      overflow-x: auto;
      padding-bottom: 4px;
      margin-top: 8px;
    }
    
    .heatmap-table {
      border-collapse: separate;
      border-spacing: 2px;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      width: 100%;
    }
    
    .heatmap-table th, .heatmap-table td {
      height: 18px;
      min-width: 18px;
      text-align: center;
      border-radius: var(--radius-xs);
      padding: 1px;
    }
    
    .heatmap-table th {
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 600;
      font-size: 0.6rem;
    }
    
    .heatmap-table td {
      font-weight: 700;
      cursor: pointer;
    }
    
    .heatmap-table td:hover {
      box-shadow: inset 0 0 0 1px var(--md-sys-color-on-surface);
    }
    
    .heatmap-legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 8px;
      font-size: 0.68rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
    }
    
    .heatmap-legend i {
      display: inline-block;
      width: 16px;
      height: 8px;
      border-radius: 2px;
      border: 1px solid var(--border-color);
    }
    
    /* 空白状态 */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.9rem;
      border-radius: var(--radius-md);
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
    }
    
    .empty-state .icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }
    
    .footer {
      text-align: center;
      padding: 16px 12px 8px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.72rem;
      font-weight: 500;
    }
    
    /* 响应式适配 */
    @media (max-width: 1000px) {
      .hero-flat {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .insight-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .section-grid {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 680px) {
      .top-app-bar {
        position: static;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .header-actions {
        width: 100%;
        justify-content: space-between;
      }
      .control-panel {
        flex-direction: column;
        align-items: stretch;
      }
      .range-shell {
        align-self: flex-start;
      }
      .hero-flat-metrics {
        grid-template-columns: repeat(2, 1fr);
      }
      .flat-metric-item {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 6px;
      }
      .flat-metric-item:nth-child(even) {
        padding-left: 8px;
      }
      .flat-metric-item:nth-child(n+3) {
        border-bottom: none;
        padding-top: 6px;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 420px) {
      .stats-grid, .insight-grid {
        grid-template-columns: 1fr;
      }
      .cost-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 顶栏 -->
  <div class="top-app-bar">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <h1>智能功耗监控系统</h1>
        <p>提供多维度设备电力采集与健康观测</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="clock" id="clock">--:--:--</span>
      <button class="refresh-toggle" id="refreshToggle" type="button">自动刷新</button>
      <div id="themeSwitch" class="segmented">
        <button data-val="auto" class="active">自动</button>
        <button data-val="light">☀️</button>
        <button data-val="dark">🌙</button>
      </div>
    </div>
  </div>
  
  <!-- 控制面板 -->
  <div class="control-panel">
    <div class="device-tabs" id="deviceTabs"></div>
    <div class="range-shell">
      <div class="range-bar" id="rangeBar">
        <button class="range-btn active" data-range="today">今日</button>
        <button class="range-btn" data-range="7d">近7天</button>
        <button class="range-btn" data-range="30d">近30天</button>
        <button class="range-btn" data-range="90d">近90天</button>
        <button class="range-btn" data-range="year">今年</button>
        <button class="range-btn" data-range="custom">自定义</button>
      </div>
      <div class="custom-range" id="customRange">
        <input type="date" id="startDate" title="开始日期">
        <span style="color:var(--md-sys-color-on-surface-variant);font-size:.85rem">~</span>
        <input type="date" id="endDate" title="结束日期">
        <button class="apply-btn" onclick="applyCustomRange()">查询</button>
      </div>
    </div>
  </div>
  
  <!-- 看板容器 -->
  <div id="mainContent">
    <div class="empty-state">
      <div class="icon">🔌</div>
      <div>正在连接设备并拉取数据...</div>
    </div>
  </div>
</div>

<div class="footer">⚡ 智能插座功耗监控 · 每 30 秒自动分析 · 极简冷色工业风主题</div>

<script>
  const API = location.origin;
  let currentDevice = null;
  let currentRange = 'today';
  let chartInstances = {};
  let renderKey = null;
  let autoRefresh = true;
  
  // 字符串转义工具
  const esc = (s) => String(s ?? '').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
  const clamp = (n, min=0, max=100) => Math.min(max, Math.max(min, Number(n) || 0));
  
  // 主题解析与配置
  function getTheme() { return localStorage.getItem('pm_theme') || 'auto'; }
  function resolvedTheme(val=getTheme()) {
    return val === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : val;
  }
  function applyTheme(val) {
    localStorage.setItem('pm_theme', val);
    document.documentElement.setAttribute('data-theme', resolvedTheme(val));
    document.querySelectorAll('#themeSwitch button').forEach(b => b.classList.toggle('active', b.dataset.val === val));
    refreshChartTheme();
  }
  
  function refreshChartTheme() {
    Object.values(chartInstances).forEach(c => {
      if (!c?.options?.scales) return;
      const colors = chartColors();
      if (c.options.scales.x) {
        c.options.scales.x.ticks.color = colors.text;
      }
      if (c.options.scales.y) {
        c.options.scales.y.ticks.color = colors.text;
        c.options.scales.y.grid.color = colors.grid;
      }
      c.update('none');
    });
  }
  
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (getTheme() === 'auto') applyTheme('auto');
  });
  
  document.querySelectorAll('#themeSwitch button').forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.val)));
  
  document.getElementById('refreshToggle').addEventListener('click', () => {
    autoRefresh = !autoRefresh;
    const b = document.getElementById('refreshToggle');
    b.classList.toggle('paused', !autoRefresh);
    b.textContent = autoRefresh ? '自动刷新' : '已暂停';
  });
  
  applyTheme(getTheme());
  
  // 数据格式化函数
  function fmt(n, d=1) { return n != null && Number.isFinite(Number(n)) ? Number(n).toFixed(d) : '--'; }
  function fmtYuan(n) { return n != null && Number.isFinite(Number(n)) ? '¥'+Number(n).toFixed(2) : '--'; }
  function fmtDate(d) { return d ? d.substring(5) : '--'; }
  function fmtMonth(m) { return m ? m.substring(5) : '--'; }
  function fmtFullTime(ts) { return ts ? ts.replace('T', ' ') : '--'; }
  
  function updateTime() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  }
  
  // 范围控制
  document.querySelectorAll('.range-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    document.getElementById('customRange').classList.toggle('show', currentRange === 'custom');
    if (currentDevice) refresh(currentDevice);
  }));
  
  function applyCustomRange() {
    if (currentDevice) refresh(currentDevice);
  }
  
  function getRangeParams() {
    const today = new Date();
    const y = today.getFullYear(), m = String(today.getMonth()+1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
    const todayStr = `${y}-${m}-${d}`;
    const addDays = (dt, n) => {
      const r = new Date(dt);
      r.setDate(r.getDate()+n);
      return r;
    };
    const f = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    
    switch (currentRange) {
      case 'today':
        return { type: 'day', date: todayStr, start: todayStr, end: todayStr, label: '今日' };
      case '7d':
        return { type: 'range', days: 7, start: f(addDays(today, -6)), end: todayStr, label: '近7天' };
      case '30d':
        return { type: 'range', days: 30, start: f(addDays(today, -29)), end: todayStr, label: '近30天' };
      case '90d':
        return { type: 'range', days: 90, start: f(addDays(today, -89)), end: todayStr, label: '近90天' };
      case 'year':
        return { type: 'year', start: `${y}-01-01`, end: todayStr, label: '今年' };
      case 'custom': {
        const s = document.getElementById('startDate').value;
        const e = document.getElementById('endDate').value;
        if (!s || !e) return { type: 'day', date: todayStr, start: todayStr, end: todayStr, label: '今日' };
        return {
          type: 'range',
          days: Math.max(1, Math.round((new Date(e) - new Date(s)) / 86400000) + 1),
          start: s,
          end: e,
          label: `${s} ~ ${e}`
        };
      }
      default:
        return { type: 'day', date: todayStr, start: todayStr, end: todayStr, label: '今日' };
    }
  }
  
  // 初始化系统
  async function init() {
    try {
      const res = await fetch(`${API}/api/devices`);
      const devices = await res.json();
      if (!devices.length) {
        document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="icon">🔌</div><div>未配置可用设备</div></div>';
        return;
      }
      renderDeviceTabs(devices);
      switchDevice(devices[0].device_id);
    } catch (e) {
      console.error('Init failed:', e);
      document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>数据初始化失败，请尝试刷新页面</div></div>';
    }
    
    // 定时刷新机制 (30 秒间隔)
    setInterval(() => {
      if (autoRefresh && currentDevice) refresh(currentDevice);
    }, 30000);
    
    updateTime();
    setInterval(updateTime, 1000);
  }
  
  function renderDeviceTabs(devices) {
    document.getElementById('deviceTabs').innerHTML = devices.map(d => {
      const id = esc(d.device_id);
      return `<div class="device-tab" data-id="${id}" onclick="switchDevice('${id}')"><span class="live-dot-flat" id="dot_${id}"></span><span>${esc(d.name || d.device_id)}</span></div>`;
    }).join('');
  }
  
  async function switchDevice(deviceId) {
    currentDevice = deviceId;
    document.querySelectorAll('.device-tab').forEach(t => t.classList.toggle('active', t.dataset.id === deviceId));
    await refresh(deviceId);
  }
  
  // 拉取与刷新看板数据
  async function refresh(deviceId) {
    try {
      const rp = getRangeParams();
      const sid = encodeURIComponent(deviceId);
      const viewParam = rp.type === 'day' ? 'today' : (rp.type === 'year' ? 'year' : 'range');
      
      const data = await fetch(`${API}/api/dashboard/${sid}?view=${viewParam}&start_date=${rp.start}&end_date=${rp.end}`).then(r => r.json());
      const key = `${deviceId}|${rp.type}|${rp.start}|${rp.end}`;
      const shouldRender = key !== renderKey;
      const latest = data.latest || {};
      const config = data.config || {};
      
      // 更新在线指示灯状态
      document.querySelectorAll(`#dot_${CSS.escape(deviceId)}`).forEach(dot => {
        dot.className = latest.reachable ? 'live-dot-flat' : 'live-dot-flat offline';
      });
      
      let html = '';
      if (rp.type === 'day') {
        const today = data.today_stats || {}, readings = data.readings || [], hourly = data.hourly || [], peak = data.peak || {}, cost = data.cost || {};
        const label = rp.date === new Date().toISOString().slice(0, 10) ? '今日' : rp.date;
        
        html = `
          ${buildHero(latest, today, cost, config, label)}
          ${buildStatsCards(latest, today, latest.reachable, latest.power_on, label)}
          ${buildDayInsights(latest, today, cost, peak, config)}
          <div class="section-grid">
            <div class="section-col">
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📊 ${label}实时功率趋势</span>
                  <span class="badge">分钟级</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartLive"></canvas>
                </div>
              </div>
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📈 小时功率分布分析</span>
                  <span class="badge">Min / Avg / Max</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartHourly"></canvas>
                </div>
              </div>
            </div>
            <div class="section-col">
              ${buildPeakCard(peak, label)}
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">🌡️ 插座温度趋势</span>
                  <span class="badge">单位 °C</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartTemp"></canvas>
                </div>
              </div>
              ${buildCostCard(cost, config)}
            </div>
          </div>
        `;
        
        if (shouldRender) setContent(html, key);
        paintLiveChart(readings);
        if (shouldRender) paintHourlyChart(hourly);
        paintTempChart(readings);
        
      } else if (rp.type === 'year') {
        const monthly = data.monthly || [], cost = data.cost || {};
        html = `
          ${buildHero(latest, rangeSummaryFromCost(cost), cost, config, rp.label)}
          ${buildRangeStats(latest, cost, rp.start, rp.end)}
          ${buildRangeInsights(cost, {}, config, monthly)}
          <div class="section-grid">
            <div class="section-col">
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📅 月度累计用电趋势</span>
                  <span class="badge">kWh</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartMonthly"></canvas>
                </div>
              </div>
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📈 月度负载功率</span>
                  <span class="badge">Max / Avg W</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartMonthlyPower"></canvas>
                </div>
              </div>
            </div>
            <div class="section-col">
              ${buildCostCard(cost, config)}
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">🌡️ 月均温度变化</span>
                  <span class="badge">Avg / Max °C</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartMonthlyTemp"></canvas>
                </div>
              </div>
            </div>
          </div>
        `;
        
        if (shouldRender) {
          setContent(html, key);
          paintMonthlyChart(monthly);
          paintMonthlyPowerChart(monthly);
          paintMonthlyTempChart(monthly);
        }
        
      } else {
        const daily = data.daily || [], cost = data.cost || {}, standby = data.standby || {}, heatmap = data.heatmap || [];
        html = `
          ${buildHero(latest, rangeSummaryFromCost(cost), cost, config, rp.label)}
          ${buildRangeStats(latest, cost, rp.start, rp.end)}
          ${buildRangeInsights(cost, standby, config, daily)}
          <div class="section-grid">
            <div class="section-col">
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📅 每日用电走势</span>
                  <span class="badge">${fmtDate(rp.start)} ~ ${fmtDate(rp.end)}</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartDaily"></canvas>
                </div>
              </div>
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">🌡️ 24小时功率分布热力图</span>
                  <span class="badge">单位: 小时均值 W</span>
                </div>
                <div class="heatmap-container" id="heatmapContainer"></div>
                <div class="heatmap-legend">
                  <span>轻载</span>
                  <i style="background:var(--hm1)"></i>
                  <i style="background:var(--hm2)"></i>
                  <i style="background:var(--hm3)"></i>
                  <i style="background:var(--hm4)"></i>
                  <span>重载</span>
                </div>
              </div>
            </div>
            <div class="section-col">
              ${buildCostCard(cost, config)}
              ${buildStandbyCard(standby)}
            </div>
          </div>
        `;
        
        if (shouldRender) {
          setContent(html, key);
          paintDailyChart(daily);
          paintHeatmap(heatmap);
        }
      }
    } catch (e) {
      console.error('Refresh failed:', e);
    }
  }
  
  function setContent(html, key) {
    Object.keys(chartInstances).forEach(destroyChart);
    document.getElementById('mainContent').innerHTML = html;
    renderKey = key;
  }
  
  function rangeSummaryFromCost(cost) {
    return { avg_power: null, max_power: null, kwh_estimate: cost.total_kwh, uptime_pct: null, max_temp: null };
  }
  
  function statusText(d) {
    if (!d.reachable) return ['设备离线', 'error'];
    if (!d.power_on) return ['已关机', 'warn'];
    return ['正常监测', 'ok'];
  }
  
  // 极简高密度 Hero 看板
  function buildHero(d, stats, cost, config, label) {
    const [text, level] = statusText(d);
    const power = d.reachable ? (d.power_on ? fmt(d.power_w) : 'OFF') : '--';
    const unit = d.reachable && d.power_on ? 'W' : '';
    const ts = fmtFullTime(d.timestamp);
    
    const dotClass = d.reachable ? 'live-dot-flat' : 'live-dot-flat offline';
    const switchText = d.power_on ? '已开启 ON' : '已关闭 OFF';
    const switchClass = d.power_on ? 'on' : 'off';
    const tempClass = d.temperature > 50 ? 'temp-high' : '';
    const billingText = config.is_tou ? '分时电价' : '统一标准';
    
    return `
      <div class="hero-flat">
        <div class="hero-flat-main">
          <div class="hero-flat-header">
            <div class="hero-flat-title-row">
              <span class="device-status-dot ${dotClass}"></span>
              <h2>${esc(label)} 设备概览</h2>
            </div>
            <span class="hero-flat-time">数据最后更新: ${ts}</span>
          </div>
          
          <div class="hero-flat-metrics">
            <div class="flat-metric-item">
              <span class="flat-metric-label">实时功率</span>
              <div class="flat-metric-val font-mono">${power} <span class="unit">${unit}</span></div>
              <span class="flat-metric-sub">${d.reachable ? (d.power_on ? '监测设备负载中' : '设备处于待口关机') : '通信已断开'}</span>
            </div>
            <div class="flat-metric-item">
              <span class="flat-metric-label">今日预估用电</span>
              <div class="flat-metric-val font-mono">${fmt(stats.kwh_estimate, 3)} <span class="unit">kWh</span></div>
              <span class="flat-metric-sub">在线采集统计估算</span>
            </div>
            <div class="flat-metric-item">
              <span class="flat-metric-label">设备温度</span>
              <div class="flat-metric-val font-mono ${tempClass}">${fmt(d.temperature)} <span class="unit">°C</span></div>
              <span class="flat-metric-sub">安全阈值范围: &lt;50°C</span>
            </div>
            <div class="flat-metric-item">
              <span class="flat-metric-label">今日产生电费</span>
              <div class="flat-metric-val font-mono">${fmtYuan(cost.total_cost)}</div>
              <span class="flat-metric-sub">计价模式: ${billingText}</span>
            </div>
          </div>
        </div>
        
        <div class="hero-flat-side">
          <h3 class="side-title">基本信息与配置</h3>
          <div class="side-details">
            <div class="side-row">
              <span class="lbl">网络可达性</span>
              <span class="val badge-flat ${level}">${text}</span>
            </div>
            <div class="side-row">
              <span class="lbl">物理继电器</span>
              <span class="val status-switch-flat ${switchClass}">${switchText}</span>
            </div>
            <div class="side-row">
              <span class="lbl">设备今日最高温</span>
              <span class="val font-mono">${fmt(stats.max_temp)} °C</span>
            </div>
            <div class="side-row">
              <span class="lbl">插头采集频率</span>
              <span class="val font-mono">${config.collect_interval || '--'} 秒/样</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }
  
  function buildStatsCards(d, today, online, on, label) {
    return `
      <div class="stats-grid">
        <div class="stat-card accent">
          <div class="stat-label">实时功率</div>
          <div>
            <div class="stat-value font-mono">${online ? (on ? fmt(d.power_w) : 'OFF') : '--'}${online && on ? '<span class="stat-unit">W</span>' : ''}</div>
            <div class="stat-foot">${online ? (on ? '负载中' : '插座已关') : '离线'}</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">${label}均负载</div>
          <div>
            <div class="stat-value font-mono">${fmt(today.avg_power)}<span class="stat-unit">W</span></div>
            <div class="stat-foot">期间功率均值</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">${label}最高峰</div>
          <div>
            <div class="stat-value font-mono">${fmt(today.max_power)}<span class="stat-unit">W</span></div>
            <div class="stat-foot">瞬时最大冲击</div>
          </div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">${label}耗能</div>
          <div>
            <div class="stat-value font-mono">${fmt(today.kwh_estimate, 3)}<span class="stat-unit">kWh</span></div>

  // 图表配色
  function chartColors() {

    return {
      grid: dark ? '#334155' : '#cbd5e1',
      text: dark ? '#94a3b8' : '#64748b',
      avg: dark ? 'rgba(56, 189, 248, 0.15)' : 'rgba(2, 132, 199, 0.1)',
      avgBorder: dark ? '#38bdf8' : '#0284c7',
      max: dark ? 'rgba(248, 113, 113, 0.25)' : 'rgba(239, 68, 68, 0.15)',
      maxBorder: dark ? '#f87171' : '#ef4444',
      min: dark ? 'rgba(52, 211, 153, 0.2)' : 'rgba(16, 185, 129, 0.12)',
      temp: dark ? 'rgba(251, 191, 36, 0.2)' : 'rgba(245, 158, 11, 0.15)',
      tempBorder: dark ? '#fbbf24' : '#f59e0b',
      bar: dark ? 'rgba(56, 189, 248, 0.2)' : 'rgba(2, 132, 199, 0.15)',
      barBorder: dark ? '#38bdf8' : '#0284c7',
      surface: dark ? '#1e293b' : '#ffffff'
    };

  function destroyChart(id) {
    if (chartInstances[id]) {
      chartInstances[id].destroy();
      delete chartInstances[id];
    }
  }
  
  // 极简扁平 Chart.js 坐标系
  function makeScales(showGrid=true) {
    const c = chartColors();
    return {

        beginAtZero: true

  function basePlugins() {
    const c = chartColors();

  // 1. 实时折线图绘制
  function paintLiveChart(readings) {
    if (!readings.length) return;
    const c = chartColors();
    const labels = readings.map(r => r.timestamp ? r.timestamp.split(' ')[1] : '');
    const data = readings.map(r => r.power_on ? (r.reachable ? r.power_w : null) : 0);
    
    if (chartInstances.live) {
      chartInstances.live.data.labels = labels;
      chartInstances.live.data.datasets[0].data = data;
      chartInstances.live.update('none');
      return;

          data,
          borderColor: c.avgBorder,
          backgroundColor: c.avg,
          fill: true,
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        scales: makeScales(false),
        plugins: {
          ...basePlugins(),
          legend: { display: false }
        }

    });

  // 8. 热力图绘制
  function paintHeatmap(data) {
    const container = document.getElementById('heatmapContainer');
    if (!container) return;
    if (!data.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--md-sys-color-on-surface-variant);padding:24px;font-weight:600;font-size:0.75rem;">暂无有效采样点</div>';
      return;
    }
    
    const maxW = Math.max(...data.map(d => d.max_w || 0), 1);
    const hours = Array.from({ length: 24 }, (_, i) => i);
    const days = [...new Set(data.map(d => d.day))].sort();
    
    const colorFor = (w) => {
      if (!w) return 'var(--md-sys-color-surface-variant)';
      const r = w / maxW;
      if (r < 0.25) return 'var(--hm1)';
      if (r < 0.5) return 'var(--hm2)';
      if (r < 0.75) return 'var(--hm3)';
      return 'var(--hm4)';
    };
    
    const map = {};
    data.forEach(d => { map[`${d.day}_${d.hour}`] = d; });
    
    let html = '<table class="heatmap-table"><thead><tr><th></th>';
    hours.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    
    days.forEach(day => {
      html += `<tr><th style="white-space:nowrap; padding-right: 4px;">${fmtDate(day)}</th>`;
      hours.forEach(h => {
        const d = map[`${day}_${h}`];
        const w = d ? d.avg_w : null;
        const fg = w && (w / maxW >= 0.55) ? 'rgba(255,255,255,0.95)' : 'var(--md-sys-color-on-surface)';
        html += `<td title="${day} ${h}:00 · 均值:${fmt(w)}W" style="background:${colorFor(w)};color:${w ? fg : 'transparent'}">${w ? Math.round(w) : ''}</td>`;
      });
      html += '</tr>';
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
  }
  
  // 初始化运行
  init();
</script>
</body>
</html>
