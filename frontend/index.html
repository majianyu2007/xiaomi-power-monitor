<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ 智能功耗监控系统</title>
  <!-- 引入 Google Fonts 高级字体库 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  
  <style>
    /* Material Design 3 风格变量系统 */
    :root {
      color-scheme: light;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-title: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: 'JetBrains Mono', "SF Mono", monospace;
      
      --md-sys-color-primary: #6750a4;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #eaddff;
      --md-sys-color-on-primary-container: #21005d;
      --md-sys-color-secondary: #625b71;
      --md-sys-color-secondary-container: #e8def8;
      --md-sys-color-tertiary: #7d5260;
      --md-sys-color-tertiary-container: #ffd8e4;
      --md-sys-color-error: #ba1a1a;
      --md-sys-color-error-container: #ffdad6;
      --md-sys-color-surface: #fef7ff;
      --md-sys-color-on-surface: #1d1b20;
      --md-sys-color-surface-variant: #e7e0ec;
      --md-sys-color-on-surface-variant: #49454f;
      --md-sys-color-outline: #79747e;
      --md-sys-color-outline-variant: #cac4d0;
      --md-sys-color-success: #1f7a3f;
      --md-sys-color-success-container: #c6f0cd;
      --md-sys-color-warning: #8a5100;
      --md-sys-color-warning-container: #ffddb0;
      
      /* 模糊卡片与高端配色 */
      --surface-bg: rgba(254, 247, 255, 0.75);
      --surface-color-rgb: 254, 247, 255;
      --border-color: rgba(121, 116, 126, 0.12);
      --bg: radial-gradient(circle at top left, rgba(103, 80, 164, 0.08), transparent 35%), 
            radial-gradient(circle at bottom right, rgba(125, 82, 96, 0.05), transparent 35%), 
            #faf8fd;
      
      --radius-xs: 10px;
      --radius-sm: 14px;
      --radius-md: 20px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      
      --shadow-1: 0 4px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.02);
      --shadow-2: 0 12px 30px rgba(103, 80, 164, 0.08), 0 4px 12px rgba(0, 0, 0, 0.03);
      
      --hm1: rgba(31, 122, 63, 0.15);
      --hm2: rgba(255, 221, 176, 0.6);
      --hm3: rgba(255, 185, 92, 0.6);
      --hm4: rgba(186, 26, 26, 0.3);
    }
    
    [data-theme="dark"] {
      color-scheme: dark;
      --md-sys-color-primary: #d0bcff;
      --md-sys-color-on-primary: #381e72;
      --md-sys-color-primary-container: #4f378b;
      --md-sys-color-on-primary-container: #eaddff;
      --md-sys-color-secondary: #ccc2dc;
      --md-sys-color-secondary-container: #4a4458;
      --md-sys-color-tertiary: #efb8c8;
      --md-sys-color-tertiary-container: #633b48;
      --md-sys-color-error: #ffb4ab;
      --md-sys-color-error-container: #93000a;
      --md-sys-color-surface: #141218;
      --md-sys-color-on-surface: #e6e0e9;
      --md-sys-color-surface-variant: #49454f;
      --md-sys-color-on-surface-variant: #cac4d0;
      --md-sys-color-outline: #938f99;
      --md-sys-color-outline-variant: #49454f;
      --md-sys-color-success: #8dd7a5;
      --md-sys-color-success-container: #1f4d31;
      --md-sys-color-warning: #ffb95c;
      --md-sys-color-warning-container: #5f3800;
      
      --surface-bg: rgba(20, 18, 24, 0.65);
      --surface-color-rgb: 20, 18, 24;
      --border-color: rgba(230, 224, 233, 0.08);
      --bg: radial-gradient(circle at top left, rgba(208, 188, 255, 0.1), transparent 45%), 
            radial-gradient(circle at bottom right, rgba(239, 184, 200, 0.04), transparent 45%), 
            #0f0d13;
      
      --shadow-1: 0 4px 20px rgba(0, 0, 0, 0.25);
      --shadow-2: 0 16px 40px rgba(0, 0, 0, 0.45);
      
      --hm1: rgba(141, 215, 165, 0.2);
      --hm2: rgba(255, 185, 92, 0.25);
      --hm3: rgba(255, 139, 92, 0.3);
      --hm4: rgba(242, 184, 181, 0.35);
    }
    
    /* 核心样式重置与全局排版 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      background-attachment: fixed;
      color: var(--md-sys-color-on-surface);
      font-family: var(--font-sans);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    
    .font-title {
      font-family: var(--font-title);
    }
    
    .font-mono {
      font-family: var(--font-mono);
    }
    
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px clamp(12px, 2.4vw, 32px) 28px;
    }
    
    /* 顶栏 App Bar (毛玻璃质感) */
    .top-app-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      margin: -18px calc(clamp(12px, 2.4vw, 32px) * -1) 24px;
      padding: 16px clamp(12px, 2.4vw, 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(var(--surface-color-rgb), 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    
    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-tertiary));
      color: white;
      box-shadow: 0 4px 12px rgba(103, 80, 164, 0.3);
      font-size: 1.35rem;
    }
    
    .brand h1 {
      font-family: var(--font-title);
      font-size: clamp(1.2rem, 2.2vw, 1.65rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--md-sys-color-on-surface);
    }
    
    .brand p {
      font-size: 0.8rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
      margin-top: 2px;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    
    .clock {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--md-sys-color-primary);
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--md-sys-color-primary-container);
      border: 1px solid rgba(103, 80, 164, 0.15);
      box-shadow: var(--shadow-1);
    }
    
    .refresh-toggle {
      border: 1px solid var(--border-color);
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-size: 0.85rem;
      font-weight: 700;
      box-shadow: var(--shadow-1);
      transition: all 0.25s ease;
    }
    
    .refresh-toggle:hover {
      background: var(--md-sys-color-surface-variant);
      transform: translateY(-1px);
    }
    
    .refresh-toggle.paused {
      background: var(--md-sys-color-error-container);
      color: var(--md-sys-color-error);
      border-color: rgba(179, 38, 30, 0.2);
    }
    
    /* 选项卡及控制面板 */
    .control-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    .device-tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 4px;
    }
    
    .device-tabs::-webkit-scrollbar {
      display: none;
    }
    
    .device-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      padding: 10px 20px;
      border-radius: 999px;
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-1);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .device-tab:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-2);
      border-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-surface);
    }
    
    .device-tab.active {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-color: var(--md-sys-color-primary);
      box-shadow: var(--shadow-2);
    }
    
    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--md-sys-color-success);
      box-shadow: 0 0 0 4px rgba(31, 122, 63, 0.2), 0 0 10px var(--md-sys-color-success);
      animation: pulse 2.5s infinite;
      display: inline-block;
    }
    
    .live-dot.offline {
      background: var(--md-sys-color-outline);
      box-shadow: none;
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }
    
    .segmented {
      display: inline-flex;
      gap: 2px;
      padding: 4px;
      border-radius: 999px;
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--border-color);
    }
    
    .segmented button {
      border: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 999px;
      color: var(--md-sys-color-on-surface-variant);
      background: transparent;
      font-size: 0.82rem;
      font-weight: 700;
      transition: all 0.2s ease;
    }
    
    .segmented button.active {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      box-shadow: var(--shadow-1);
    }
    
    .range-shell {
      padding: 6px;
      border-radius: 999px;
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-1);
    }
    
    .range-bar {
      display: flex;
      gap: 4px;
    }
    
    .range-btn {
      padding: 8px 18px;
      border-radius: 999px;
      background: transparent;
      border: none;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .range-btn:hover {
      background: rgba(103, 80, 164, 0.08);
      color: var(--md-sys-color-on-surface);
    }
    
    .range-btn.active {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      box-shadow: var(--shadow-1);
    }
    
    .custom-range {
      display: none;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 20px;
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      animation: slide-down 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .custom-range.show {
      display: flex;
    }
    
    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .custom-range input {
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border-color);
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: var(--font-sans);
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .custom-range input:focus {
      border-color: var(--md-sys-color-primary);
    }
    
    .apply-btn {
      height: 38px;
      padding: 0 20px;
      border-radius: 999px;
      border: none;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .apply-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-2);
    }
    
    /* 核心数据看板 & 卡片 (毛玻璃效果) */
    .card, .live-power-box, .status-panel, .stat-card, .insight-card {
      background: var(--surface-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-1);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
    }
    
    .card:hover, .stat-card:hover, .insight-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-2);
      border-color: var(--md-sys-color-primary-container);
    }
    
    /* 1. 实时负载布局 */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .live-power-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      position: relative;
      background: linear-gradient(135deg, rgba(103, 80, 164, 0.08), rgba(125, 82, 96, 0.04));
    }
    
    .pulse-container {
      position: relative;
      width: 190px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .power-circle {
      width: 174px;
      height: 174px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--md-sys-color-surface);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.04);
      border: 1px solid var(--border-color);
      z-index: 2;
    }
    
    .power-glow-ring {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 50%;
      z-index: 1;
      background: conic-gradient(from 0deg, var(--glow-color-1, #79747e), var(--glow-color-2, #cac4d0), var(--glow-color-1, #79747e));
      mask: radial-gradient(circle, transparent 65%, black 66%);
      -webkit-mask: radial-gradient(circle, transparent 65%, black 66%);
      animation: rotate-ring 6s linear infinite;
      opacity: 0.85;
      transition: background 0.5s ease;
    }
    
    @keyframes rotate-ring {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .pulse-wave {
      position: absolute;
      top: -12px;
      left: -12px;
      right: -12px;
      bottom: -12px;
      border-radius: 50%;
      border: 2px solid var(--glow-color-1, #79747e);
      opacity: 0;
      z-index: 0;
      animation: pulse-out 2.5s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }
    
    @keyframes pulse-out {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    
    .power-circle-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    
    .power-circle-val {
      font-family: var(--font-title);
      font-size: 3.4rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--md-sys-color-on-surface);
    }
    
    .power-circle-unit {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 4px;
    }
    
    .power-circle-sub {
      margin-top: 18px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
      background: var(--md-sys-color-surface-variant);
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border-color);
    }
    
    /* 设备状态详情 */
    .status-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .status-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .status-title {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--md-sys-color-on-surface);
    }
    
    .status-badge {
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }
    
    .status-badge.ok {
      background: var(--md-sys-color-success-container);
      color: var(--md-sys-color-success);
    }
    
    .status-badge.warn {
      background: var(--md-sys-color-warning-container);
      color: var(--md-sys-color-warning);
    }
    
    .status-badge.error {
      background: var(--md-sys-color-error-container);
      color: var(--md-sys-color-error);
    }
    
    .status-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .status-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    
    .status-item .lbl {
      font-size: 0.85rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
    }
    
    .status-item .val {
      font-size: 0.92rem;
      font-weight: 700;
    }
    
    .status-switch.on { color: var(--md-sys-color-success); }
    .status-switch.off { color: var(--md-sys-color-outline); }
    .temp-high { color: var(--md-sys-color-error); animation: blink 1.5s infinite; }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    /* 2. 统计数据网格 (6 列) */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      min-height: 124px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
    }
    
    .stat-card.accent {
      background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-secondary));
      color: var(--md-sys-color-on-primary);
      border-color: transparent;
    }
    
    .stat-card.accent .stat-label {
      color: rgba(255, 255, 255, 0.8);
    }
    
    .stat-card.accent .stat-value {
      color: #ffffff;
    }
    
    .stat-card.accent .stat-foot {
      color: rgba(255, 255, 255, 0.7);
    }
    
    .stat-card.warning {
      background: linear-gradient(135deg, var(--md-sys-color-warning-container), rgba(255, 221, 176, 0.15));
      color: var(--md-sys-color-warning);
      border-color: transparent;
    }
    
    .stat-card.success {
      background: linear-gradient(135deg, var(--md-sys-color-success-container), rgba(198, 240, 205, 0.15));
      color: var(--md-sys-color-success);
      border-color: transparent;
    }
    
    .stat-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    
    .stat-value {
      font-size: clamp(1.4rem, 2.5vw, 2.1rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin: 4px 0;
      color: var(--md-sys-color-on-surface);
    }
    
    .stat-unit {
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 4px;
      letter-spacing: 0;
    }
    
    .stat-foot {
      font-size: 0.72rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
    }
    
    /* 3. 指标深度卡片 (4 列) */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .insight-card {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .insight-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--md-sys-color-on-surface-variant);
    }
    
    .insight-value {
      font-size: 1.85rem;
      font-weight: 900;
      color: var(--md-sys-color-on-surface);
      letter-spacing: -0.03em;
      margin: 8px 0;
    }
    
    .insight-value .unit {
      font-size: 0.85rem;
      font-weight: 700;
      margin-left: 4px;
    }
    
    .insight-caption {
      font-size: 0.75rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 500;
      line-height: 1.4;
    }
    
    .meter {
      height: 8px;
      border-radius: 99px;
      background: var(--md-sys-color-surface-variant);
      overflow: hidden;
      margin: 8px 0;
      border: 1px solid var(--border-color);
    }
    
    .meter i {
      display: block;
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-tertiary));
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* 4. 双栏图表与卡片布局 */
    .section-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 20px;
    }
    
    .section-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .card-title-main {
      font-family: var(--font-title);
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--md-sys-color-on-surface);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 800;
      background: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-on-primary-container);
      border: 1px solid var(--border-color);
    }
    
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 260px;
      margin-top: 10px;
    }
    
    /* 峰值分析与电费面板 */
    .peak-active-card {
      background: linear-gradient(135deg, var(--md-sys-color-error-container), rgba(255, 218, 214, 0.15));
      border-color: rgba(186, 26, 26, 0.2);
    }
    
    .peak-badge {
      background: var(--md-sys-color-error);
      color: var(--md-sys-color-on-primary);
      border: none;
    }
    
    .peak-value {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--md-sys-color-error);
      margin: 10px 0;
      letter-spacing: -0.04em;
    }
    
    .peak-caption {
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.6;
    }
    
    .cost-big {
      padding: 4px 0 16px;
    }
    
    .cost-label {
      font-size: 0.78rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .cost-value {
      font-size: 2.3rem;
      font-weight: 900;
      color: var(--md-sys-color-primary);
      letter-spacing: -0.04em;
      margin-top: 4px;
    }
    
    .cost-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .cost-item {
      padding: 14px;
      border-radius: 18px;
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .cost-item .cost-value {
      font-size: 1.15rem;
      color: var(--md-sys-color-on-surface);
      margin-top: 4px;
    }
    
    .standby-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 8px 0;
    }
    
    .standby-val {
      font-size: 1.8rem;
      color: var(--md-sys-color-warning);
    }
    
    .standby-bar {
      height: 10px;
      border-radius: 99px;
      background: var(--md-sys-color-surface-variant);
      overflow: hidden;
      margin: 10px 0 14px;
      border: 1px solid var(--border-color);
    }
    
    .standby-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--md-sys-color-warning), var(--md-sys-color-error));
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* 热力图 */
    .heatmap-container {
      overflow-x: auto;
      padding-bottom: 8px;
      margin-top: 12px;
      scrollbar-width: thin;
    }
    
    .heatmap-table {
      border-collapse: separate;
      border-spacing: 4px;
      font-size: 0.7rem;
      font-family: var(--font-mono);
      width: 100%;
    }
    
    .heatmap-table th, .heatmap-table td {
      height: 24px;
      min-width: 24px;
      text-align: center;
      border-radius: 6px;
      padding: 1px;
    }
    
    .heatmap-table th {
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 700;
      font-size: 0.65rem;
    }
    
    .heatmap-table td {
      font-weight: 800;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
      cursor: pointer;
    }
    
    .heatmap-table td:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      z-index: 10;
      position: relative;
    }
    
    .heatmap-legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 12px;
      font-size: 0.72rem;
      color: var(--md-sys-color-on-surface-variant);
      font-weight: 600;
    }
    
    .heatmap-legend i {
      display: inline-block;
      width: 20px;
      height: 10px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }
    
    /* 空白状态 */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 1.1rem;
      border-radius: 28px;
      background: var(--surface-bg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-1);
    }
    
    .empty-state .icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }
    
    .footer {
      text-align: center;
      padding: 24px 16px 12px;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 0.78rem;
      font-weight: 600;
    }
    
    /* 响应式适配 */
    @media (max-width: 1200px) {
      .hero, .section-grid {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .insight-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .control-panel {
        flex-direction: column;
        align-items: stretch;
      }
      .range-shell {
        align-self: flex-start;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 480px) {
      .stats-grid, .insight-grid {
        grid-template-columns: 1fr;
      }
      .cost-grid {
        grid-template-columns: 1fr;
      }
      .power-circle-sub {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- 顶栏 -->
  <div class="top-app-bar">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <h1>智能功耗监控系统</h1>
        <p>提供多维度设备电力采集与健康观测</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="clock" id="clock">--:--:--</span>
      <button class="refresh-toggle" id="refreshToggle" type="button">自动刷新</button>
      <div id="themeSwitch" class="segmented">
        <button data-val="auto" class="active">自动</button>
        <button data-val="light">☀️</button>
        <button data-val="dark">🌙</button>
      </div>
    </div>
  </div>
  
  <!-- 控制面板 -->
  <div class="control-panel">
    <div class="device-tabs" id="deviceTabs"></div>
    <div class="range-shell">
      <div class="range-bar" id="rangeBar">
        <button class="range-btn active" data-range="today">今日</button>
        <button class="range-btn" data-range="7d">近7天</button>
        <button class="range-btn" data-range="30d">近30天</button>
        <button class="range-btn" data-range="90d">近90天</button>
        <button class="range-btn" data-range="year">今年</button>
        <button class="range-btn" data-range="custom">自定义</button>
      </div>
      <div class="custom-range" id="customRange">
        <input type="date" id="startDate" title="开始日期">
        <span style="color:var(--md-sys-color-on-surface-variant);font-size:.85rem">~</span>
        <input type="date" id="endDate" title="结束日期">
        <button class="apply-btn" onclick="applyCustomRange()">查询</button>
      </div>
    </div>
  </div>
  
  <!-- 看板容器 -->
  <div id="mainContent">
    <div class="empty-state">
      <div class="icon">🔌</div>
      <div>正在连接设备并拉取数据...</div>
    </div>
  </div>
</div>

<div class="footer">⚡ 智能插座功耗监控 · 每 30 秒自动分析 · 莫兰迪 Material 3 主题</div>

<script>
  const API = location.origin;
  let currentDevice = null;
  let currentRange = 'today';
  let chartInstances = {};
  let renderKey = null;
  let autoRefresh = true;
  
  // 字符串转义工具
  const esc = (s) => String(s ?? '').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
  const clamp = (n, min=0, max=100) => Math.min(max, Math.max(min, Number(n) || 0));
  
  // 主题解析与配置
  function getTheme() { return localStorage.getItem('pm_theme') || 'auto'; }
  function resolvedTheme(val=getTheme()) {
    return val === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : val;
  }
  function applyTheme(val) {
    localStorage.setItem('pm_theme', val);
    document.documentElement.setAttribute('data-theme', resolvedTheme(val));
    document.querySelectorAll('#themeSwitch button').forEach(b => b.classList.toggle('active', b.dataset.val === val));
    refreshChartTheme();
  }
  
  function refreshChartTheme() {
    Object.values(chartInstances).forEach(c => {
      if (!c?.options?.scales) return;
      const colors = chartColors();
      if (c.options.scales.x) {
        c.options.scales.x.ticks.color = colors.text;
      }
      if (c.options.scales.y) {
        c.options.scales.y.ticks.color = colors.text;
        c.options.scales.y.grid.color = colors.grid;
      }
      c.update('none');
    });
  }
  
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (getTheme() === 'auto') applyTheme('auto');
  });
  
  document.querySelectorAll('#themeSwitch button').forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.val)));
  
  document.getElementById('refreshToggle').addEventListener('click', () => {
    autoRefresh = !autoRefresh;
    const b = document.getElementById('refreshToggle');
    b.classList.toggle('paused', !autoRefresh);
    b.textContent = autoRefresh ? '自动刷新' : '已暂停';
  });
  
  applyTheme(getTheme());
  
  // 数据格式化函数
  function fmt(n, d=1) { return n != null && Number.isFinite(Number(n)) ? Number(n).toFixed(d) : '--'; }
  function fmtYuan(n) { return n != null && Number.isFinite(Number(n)) ? '¥'+Number(n).toFixed(2) : '--'; }
  function fmtDate(d) { return d ? d.substring(5) : '--'; }
  function fmtMonth(m) { return m ? m.substring(5) : '--'; }
  function fmtFullTime(ts) { return ts ? ts.replace('T', ' ') : '--'; }
  
  function updateTime() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  }
  
  // 范围控制
  document.querySelectorAll('.range-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    document.getElementById('customRange').classList.toggle('show', currentRange === 'custom');
    if (currentDevice) refresh(currentDevice);
  }));
  
  function applyCustomRange() {
    if (currentDevice) refresh(currentDevice);
  }
  
  function getRangeParams() {
    const today = new Date();
    const y = today.getFullYear(), m = String(today.getMonth()+1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
    const todayStr = `${y}-${m}-${d}`;
    const addDays = (dt, n) => {
      const r = new Date(dt);
      r.setDate(r.getDate()+n);
      return r;
    };
    const f = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    
    switch (currentRange) {
      case 'today':
        return { type: 'day', date: todayStr, start: todayStr, end: todayStr, label: '今日' };
      case '7d':
        return { type: 'range', days: 7, start: f(addDays(today, -6)), end: todayStr, label: '近7天' };
      case '30d':
        return { type: 'range', days: 30, start: f(addDays(today, -29)), end: todayStr, label: '近30天' };
      case '90d':
        return { type: 'range', days: 90, start: f(addDays(today, -89)), end: todayStr, label: '近90天' };
      case 'year':
        return { type: 'year', start: `${y}-01-01`, end: todayStr, label: '今年' };
      case 'custom': {
        const s = document.getElementById('startDate').value;
        const e = document.getElementById('endDate').value;
        if (!s || !e) return { type: 'day', date: todayStr, start: todayStr, end: todayStr, label: '今日' };
        return {
          type: 'range',
          days: Math.max(1, Math.round((new Date(e) - new Date(s)) / 86400000) + 1),
          start: s,
          end: e,
          label: `${s} ~ ${e}`
        };
      }
      default:
        return { type: 'day', date: todayStr, start: todayStr, end: todayStr, label: '今日' };
    }
  }
  
  // 初始化系统
  async function init() {
    try {
      const res = await fetch(`${API}/api/devices`);
      const devices = await res.json();
      if (!devices.length) {
        document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="icon">🔌</div><div>未配置可用设备</div></div>';
        return;
      }
      renderDeviceTabs(devices);
      switchDevice(devices[0].device_id);
    } catch (e) {
      console.error('Init failed:', e);
      document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>数据初始化失败，请尝试刷新页面</div></div>';
    }
    
    // 定时刷新机制 (30 秒间隔)
    setInterval(() => {
      if (autoRefresh && currentDevice) refresh(currentDevice);
    }, 30000);
    
    updateTime();
    setInterval(updateTime, 1000);
  }
  
  function renderDeviceTabs(devices) {
    document.getElementById('deviceTabs').innerHTML = devices.map(d => {
      const id = esc(d.device_id);
      return `<div class="device-tab" data-id="${id}" onclick="switchDevice('${id}')"><span class="live-dot" id="dot_${id}"></span><span>${esc(d.name || d.device_id)}</span></div>`;
    }).join('');
  }
  
  async function switchDevice(deviceId) {
    currentDevice = deviceId;
    document.querySelectorAll('.device-tab').forEach(t => t.classList.toggle('active', t.dataset.id === deviceId));
    await refresh(deviceId);
  }
  
  // 拉取与刷新看板数据
  async function refresh(deviceId) {
    try {
      const rp = getRangeParams();
      const sid = encodeURIComponent(deviceId);
      const viewParam = rp.type === 'day' ? 'today' : (rp.type === 'year' ? 'year' : 'range');
      
      const data = await fetch(`${API}/api/dashboard/${sid}?view=${viewParam}&start_date=${rp.start}&end_date=${rp.end}`).then(r => r.json());
      const key = `${deviceId}|${rp.type}|${rp.start}|${rp.end}`;
      const shouldRender = key !== renderKey;
      const latest = data.latest || {};
      const config = data.config || {};
      
      // 更新在线指示灯状态
      document.querySelectorAll(`#dot_${CSS.escape(deviceId)}`).forEach(dot => {
        dot.className = latest.reachable ? 'live-dot' : 'live-dot offline';
      });
      
      let html = '';
      if (rp.type === 'day') {
        const today = data.today_stats || {}, readings = data.readings || [], hourly = data.hourly || [], peak = data.peak || {}, cost = data.cost || {};
        const label = rp.date === new Date().toISOString().slice(0, 10) ? '今日' : rp.date;
        
        html = `
          ${buildHero(latest, today, cost, config, label)}
          ${buildStatsCards(latest, today, latest.reachable, latest.power_on, label)}
          ${buildDayInsights(latest, today, cost, peak, config)}
          <div class="section-grid">
            <div class="section-col">
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📊 ${label}实时功率趋势</span>
                  <span class="badge">分钟级</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartLive"></canvas>
                </div>
              </div>
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📈 小时功率分布分析</span>
                  <span class="badge">Min / Avg / Max</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartHourly"></canvas>
                </div>
              </div>
            </div>
            <div class="section-col">
              ${buildPeakCard(peak, label)}
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">🌡️ 插座温度趋势</span>
                  <span class="badge">单位 °C</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartTemp"></canvas>
                </div>
              </div>
              ${buildCostCard(cost, config)}
            </div>
          </div>
        `;
        
        if (shouldRender) setContent(html, key);
        paintLiveChart(readings);
        if (shouldRender) paintHourlyChart(hourly);
        paintTempChart(readings);
        
      } else if (rp.type === 'year') {
        const monthly = data.monthly || [], cost = data.cost || {};
        html = `
          ${buildHero(latest, rangeSummaryFromCost(cost), cost, config, rp.label)}
          ${buildRangeStats(latest, cost, rp.start, rp.end)}
          ${buildRangeInsights(cost, {}, config, monthly)}
          <div class="section-grid">
            <div class="section-col">
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📅 月度累计用电趋势</span>
                  <span class="badge">kWh</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartMonthly"></canvas>
                </div>
              </div>
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📈 月度负载功率</span>
                  <span class="badge">Max / Avg W</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartMonthlyPower"></canvas>
                </div>
              </div>
            </div>
            <div class="section-col">
              ${buildCostCard(cost, config)}
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">🌡️ 月均温度变化</span>
                  <span class="badge">Avg / Max °C</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartMonthlyTemp"></canvas>
                </div>
              </div>
            </div>
          </div>
        `;
        
        if (shouldRender) {
          setContent(html, key);
          paintMonthlyChart(monthly);
          paintMonthlyPowerChart(monthly);
          paintMonthlyTempChart(monthly);
        }
        
      } else {
        const daily = data.daily || [], cost = data.cost || {}, standby = data.standby || {}, heatmap = data.heatmap || [];
        html = `
          ${buildHero(latest, rangeSummaryFromCost(cost), cost, config, rp.label)}
          ${buildRangeStats(latest, cost, rp.start, rp.end)}
          ${buildRangeInsights(cost, standby, config, daily)}
          <div class="section-grid">
            <div class="section-col">
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">📅 每日用电走势</span>
                  <span class="badge">${fmtDate(rp.start)} ~ ${fmtDate(rp.end)}</span>
                </div>
                <div class="chart-wrap">
                  <canvas id="chartDaily"></canvas>
                </div>
              </div>
              <div class="card">
                <div class="card-title">
                  <span class="card-title-main">🌡️ 24小时功率分布热力图</span>
                  <span class="badge">横轴: 小时均值 W</span>
                </div>
                <div class="heatmap-container" id="heatmapContainer"></div>
                <div class="heatmap-legend">
                  <span>轻载</span>
                  <i style="background:var(--hm1)"></i>
                  <i style="background:var(--hm2)"></i>
                  <i style="background:var(--hm3)"></i>
                  <i style="background:var(--hm4)"></i>
                  <span>重载</span>
                </div>
              </div>
            </div>
            <div class="section-col">
              ${buildCostCard(cost, config)}
              ${buildStandbyCard(standby)}
            </div>
          </div>
        `;
        
        if (shouldRender) {
          setContent(html, key);
          paintDailyChart(daily);
          paintHeatmap(heatmap);
        }
      }
    } catch (e) {
      console.error('Refresh failed:', e);
    }
  }
  
  function setContent(html, key) {
    Object.keys(chartInstances).forEach(destroyChart);
    document.getElementById('mainContent').innerHTML = html;
    renderKey = key;
  }
  
  function rangeSummaryFromCost(cost) {
    return { avg_power: null, max_power: null, kwh_estimate: cost.total_kwh, uptime_pct: null, max_temp: null };
  }
  
  function statusText(d) {
    if (!d.reachable) return ['设备离线', 'error'];
    if (!d.power_on) return ['已关机', 'warn'];
    return ['正常监测中', 'ok'];
  }
  
  // 模板生成函数群
  function buildHero(d, stats, cost, config, label) {
    const [text, level] = statusText(d);
    const power = d.reachable ? (d.power_on ? fmt(d.power_w) : 'OFF') : '--';
    const unit = d.reachable && d.power_on ? 'W' : '';
    const ts = fmtFullTime(d.timestamp);
    
    // 自适应 Conic 呼吸灯环的色彩选取
    let glow1 = 'var(--md-sys-color-outline)';
    let glow2 = 'var(--md-sys-color-outline-variant)';
    let animate = '';
    if (d.reachable) {
      if (d.power_on) {
        animate = 'animation: rotate-ring 5s linear infinite;';
        const w = d.power_w || 0;
        if (w <= 15) {
          glow1 = 'var(--md-sys-color-success)';
          glow2 = 'var(--md-sys-color-success-container)';
        } else if (w <= 300) {
          glow1 = 'var(--md-sys-color-primary)';
          glow2 = 'var(--md-sys-color-primary-container)';
        } else {
          glow1 = 'var(--md-sys-color-error)';
          glow2 = 'var(--md-sys-color-error-container)';
        }
      } else {
        glow1 = 'var(--md-sys-color-warning)';
        glow2 = 'var(--md-sys-color-warning-container)';
      }
    }
    
    return `
      <div class="hero">
        <div class="live-power-box" style="--glow-color-1: ${glow1}; --glow-color-2: ${glow2};">
          <div class="pulse-container">
            ${d.reachable && d.power_on ? '<div class="pulse-wave"></div>' : ''}
            <div class="power-circle">
              <span class="power-circle-label">${esc(label)} · 实时功率</span>
              <span class="power-circle-val font-title">${power}</span>
              <span class="power-circle-unit font-title">${unit}</span>
            </div>
            <div class="power-glow-ring" style="${animate}"></div>
          </div>
          <div class="power-circle-sub">${text} · 数据更新于 ${ts}</div>
        </div>
        
        <div class="status-panel">
          <div class="status-panel-header">
            <span class="status-title">🔍 设备运行状态</span>
            <span class="status-badge ${level}">${text}</span>
          </div>
          <div class="status-list">
            <div class="status-item">
              <span class="lbl">采集时间</span>
              <span class="val font-mono">${ts}</span>
            </div>
            <div class="status-item">
              <span class="lbl">物理开关状态</span>
              <span class="val font-mono status-switch ${d.power_on ? 'on' : 'off'}">${d.power_on ? '已开启 ON' : '已关闭 OFF'}</span>
            </div>
            <div class="status-item">
              <span class="lbl">设备运行温度</span>
              <span class="val font-mono ${d.temperature > 50 ? 'temp-high' : ''}">${fmt(d.temperature)} °C</span>
            </div>
            <div class="status-item">
              <span class="lbl">采集速率间隔</span>
              <span class="val font-mono">${config.collect_interval || '--'} 秒/样本</span>
            </div>
            <div class="status-item">
              <span class="lbl">电费计价模式</span>
              <span class="val font-mono">${config.is_tou ? '峰谷分时定价' : '统一标准电价'}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function buildRangeInsights(cost, standby, config, series) {
    const days = cost.days_covered || 1;

    const maxKwh = Array.isArray(series) && series.length ? Math.max(...series.map(x => x.kwh || 0)) : 0;
    
    return `
      <div class="insight-grid">
        <div class="insight-card">
          <div class="insight-title"><span>日均消耗电量</span><span>周期均值</span></div>

        </div>
        <div class="insight-card">
          <div class="insight-title"><span>极低待机占比</span><span>阈值 &lt; ${config.standby_threshold || 5}W</span></div>
          <div class="insight-value font-title">${fmt(standbyPct, 0)}%</div>
          <div class="meter"><i style="width:${clamp(standbyPct)}%"></i></div>

          <div class="insight-value font-title" style="font-size:1.45rem;">${fmt(cost.peak_kwh, 2)} / ${fmt(cost.valley_kwh, 2)} <span class="unit">kWh</span></div>

  // 图表配色获取
  function chartColors() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
      grid: dark ? 'rgba(230, 224, 233, 0.08)' : 'rgba(121, 116, 126, 0.12)',
      text: dark ? '#CAC4D0' : '#49454F',
      avg: dark ? 'rgba(208, 188, 255, 0.25)' : 'rgba(103, 80, 164, 0.15)',
      avgBorder: dark ? '#D0BCFF' : '#6750A4',
      max: dark ? 'rgba(242, 184, 181, 0.35)' : 'rgba(179, 38, 30, 0.2)',
      maxBorder: dark ? '#F2B8B5' : '#B3261E',
      min: dark ? 'rgba(141, 215, 165, 0.3)' : 'rgba(31, 122, 63, 0.2)',
      temp: dark ? 'rgba(255, 185, 92, 0.3)' : 'rgba(255, 185, 92, 0.25)',
      tempBorder: dark ? '#FFB95C' : '#8A5100',
      bar: dark ? 'rgba(208, 188, 255, 0.35)' : 'rgba(103, 80, 164, 0.2)',
      barBorder: dark ? '#D0BCFF' : '#6750A4',
      surface: dark ? 'rgba(20, 18, 24, 0.92)' : 'rgba(254, 247, 255, 0.94)'
    };
  }
  
  function destroyChart(id) {
    if (chartInstances[id]) {
      chartInstances[id].destroy();
      delete chartInstances[id];
    }
  }
  
  // Chart.js 坐标系公用设置
  function makeScales(showGrid=true) {
    const c = chartColors();
    return {
      x: {
        ticks: {
          color: c.text,
          maxRotation: 45,
          font: { size: 10, weight: '600', family: 'var(--font-sans)' }
        },
        grid: { display: false }
      },
      y: {
        ticks: {
          color: c.text,
          font: { weight: '600', family: 'var(--font-sans)' }
        },
        grid: { color: c.grid, drawTicks: false },
        border: { dash: [5, 5], display: false },
        beginAtZero: true
      }
    };
  }
  
  function basePlugins() {
    const c = chartColors();
    return {
      legend: {
        labels: {
          color: c.text,
          boxWidth: 12,
          usePointStyle: true,
          font: { family: 'var(--font-sans)', weight: '600', size: 11 }
        }
      },
      tooltip: {
        mode: 'index',
        intersect: false,
        backgroundColor: c.surface,
        titleColor: c.text,
        bodyColor: c.text,
        borderColor: c.grid,
        borderWidth: 1,
        padding: 12,
        cornerRadius: 12,
        titleFont: { family: 'var(--font-sans)', weight: '700' },
        bodyFont: { family: 'var(--font-sans)' }
      }
    };
  }
  
  // 1. 实时折线图绘制 (修复语法错误)
  function paintLiveChart(readings) {
    if (!readings.length) return;
    const c = chartColors();
    const labels = readings.map(r => r.timestamp ? r.timestamp.split(' ')[1] : '');
    const data = readings.map(r => r.power_on ? (r.reachable ? r.power_w : null) : 0);
    
    if (chartInstances.live) {
      chartInstances.live.data.labels = labels;
      chartInstances.live.data.datasets[0].data = data;
      chartInstances.live.update('none');
      return;
    }
    
    // 实例化 Chart.js
    chartInstances.live = new Chart(document.getElementById('chartLive'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '实时功率 W',
          data,
          borderColor: c.avgBorder,
          backgroundColor: c.avg,
          fill: true,
          tension: 0.45,
          pointRadius: 0,
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        scales: makeScales(false),
        plugins: {
          ...basePlugins(),
          legend: { display: false }
        }
      }
    });
  }
  
  // 2. 小时功率分布柱状图
  function paintHourlyChart(hourly) {
    destroyChart('hourly');
    if (!hourly.length) return;
    const c = chartColors();
    const labels = hourly.map(h => {
      const p = h.hour_key.split(' ');
      return hourly.length > 48 ? p[0].substring(5) + ' ' + p[1] + ':00' : p[1] + ':00';
    });
    
    chartInstances.hourly = new Chart(document.getElementById('chartHourly'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '最高功率 Max', data: hourly.map(h => h.max_w), backgroundColor: c.max, borderRadius: 6 },
          { label: '均值功率 Avg', data: hourly.map(h => h.avg_w), backgroundColor: c.avg, borderRadius: 6 },
          { label: '最低功率 Min', data: hourly.map(h => h.min_w), backgroundColor: c.min, borderRadius: 6 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: makeScales(),
        plugins: basePlugins()
      }
    });
  }
  
  // 3. 温度趋势图绘制
  function paintTempChart(points) {
    if (!points.length) return;
    const c = chartColors();
    
    const keptPoints = points.filter(p => (p.temperature ?? p.avg_temp) != null);
    const labels = keptPoints.map(p => p.timestamp ? p.timestamp.split(' ')[1] : (p.hour_key ? ((p.hour_key.split(' ').length > 1 ? p.hour_key.split(' ')[1] : p.hour_key) + ':00') : ''));
    const data = keptPoints.map(p => p.temperature ?? p.avg_temp);
    
    if (!data.length) return;
    if (chartInstances.temp) {
      chartInstances.temp.data.labels = labels;
      chartInstances.temp.data.datasets[0].data = data;
      chartInstances.temp.update('none');
      return;
    }
    
    chartInstances.temp = new Chart(document.getElementById('chartTemp'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '设备温度 °C',
          data,
          borderColor: c.tempBorder,
          backgroundColor: c.temp,
          fill: false,
          tension: 0.45,
          pointRadius: data.length > 80 ? 0 : 3,
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: makeScales(),
        plugins: {
          ...basePlugins(),
          legend: { display: false }
        }
      }
    });
  }
  
  // 4. 每日电量消耗图绘制
  function paintDailyChart(daily) {
    destroyChart('daily');
    if (!daily.length) return;
    const c = chartColors();
    
    chartInstances.daily = new Chart(document.getElementById('chartDaily'), {
      type: 'bar',
      data: {
        labels: daily.map(d => fmtDate(d.day)),
        datasets: [{
          label: '日用能电量 (kWh)',
          data: daily.map(d => d.kwh),
          backgroundColor: c.bar,
          borderColor: c.barBorder,
          borderWidth: 1,
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          ...makeScales(),
          y: {
            ...makeScales().y,
            title: { display: true, text: '单位: kWh', color: c.text, font: { weight: 'bold' } }
          }
        },
        plugins: {
          ...basePlugins(),
          legend: { display: false },
          tooltip: {
            ...basePlugins().tooltip,
            callbacks: {
              afterBody: (items) => {
                const d = daily[items[0].dataIndex];
                return [`峰值功率: ${fmt(d.max_power)}W`, `均值功率: ${fmt(d.avg_power)}W`, `运行温度: ${fmt(d.avg_temp)}°C`];
              }
            }
          }
        }
      }
    });
  }
  
  // 5. 月度统计用电趋势图
  function paintMonthlyChart(monthly) {
    destroyChart('monthly');
    if (!monthly.length) return;
    const c = chartColors();
    
    chartInstances.monthly = new Chart(document.getElementById('chartMonthly'), {
      type: 'bar',
      data: {
        labels: monthly.map(m => fmtMonth(m.month)),
        datasets: [{
          label: '月度用能电量 (kWh)',
          data: monthly.map(m => m.kwh),
          backgroundColor: c.bar,
          borderColor: c.barBorder,
          borderWidth: 1,
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          ...makeScales(),
          y: {
            ...makeScales().y,
            title: { display: true, text: '单位: kWh', color: c.text, font: { weight: 'bold' } }
          }
        },
        plugins: {
          ...basePlugins(),
          legend: { display: false }
        }
      }
    });
  }
  
  // 6. 月度功率均值及峰值柱状图
  function paintMonthlyPowerChart(monthly) {
    destroyChart('monthlyPower');
    if (!monthly.length) return;
    const c = chartColors();
    
    chartInstances.monthlyPower = new Chart(document.getElementById('chartMonthlyPower'), {
      type: 'bar',
      data: {
        labels: monthly.map(m => fmtMonth(m.month)),
        datasets: [
          { label: '最高冲击 Max W', data: monthly.map(m => m.max_power), backgroundColor: c.max, borderRadius: 6 },
          { label: '均值功率 Avg W', data: monthly.map(m => m.avg_power), backgroundColor: c.avg, borderRadius: 6 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: makeScales(),
        plugins: basePlugins()
      }
    });
  }
  
  // 7. 月均温度以及月最高温度走势图
  function paintMonthlyTempChart(monthly) {
    destroyChart('monthlyTemp');
    if (!monthly.length) return;
    const c = chartColors();
    
    chartInstances.monthlyTemp = new Chart(document.getElementById('chartMonthlyTemp'), {
      type: 'line',
      data: {
        labels: monthly.map(m => fmtMonth(m.month)),
        datasets: [
          { label: '月均温度 Avg °C', data: monthly.map(m => m.avg_temp), borderColor: c.tempBorder, fill: false, tension: 0.45, borderWidth: 3 },
          { label: '月最高温 Max °C', data: monthly.map(m => m.max_temp), borderColor: c.maxBorder, fill: false, tension: 0.45, borderDash: [5, 5], borderWidth: 2 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: makeScales(),
        plugins: basePlugins()
      }
    });
  }
  
  // 8. 热力图绘制机制
  function paintHeatmap(data) {
    const container = document.getElementById('heatmapContainer');
    if (!container) return;
    if (!data.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--md-sys-color-on-surface-variant);padding:36px;font-weight:600;">暂无有效采样点</div>';
      return;
    }
    
    const maxW = Math.max(...data.map(d => d.max_w || 0), 1);
    const hours = Array.from({ length: 24 }, (_, i) => i);
    const days = [...new Set(data.map(d => d.day))].sort();
    
    const colorFor = (w) => {
      if (!w) return 'var(--md-sys-color-surface-variant)';
      const r = w / maxW;
      if (r < 0.25) return 'var(--hm1)';
      if (r < 0.5) return 'var(--hm2)';
      if (r < 0.75) return 'var(--hm3)';
      return 'var(--hm4)';
    };
    
    const map = {};
    data.forEach(d => { map[`${d.day}_${d.hour}`] = d; });
    
    let html = '<table class="heatmap-table"><thead><tr><th></th>';
    hours.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    
    days.forEach(day => {
      html += `<tr><th style="white-space:nowrap; padding-right: 8px;">${fmtDate(day)}</th>`;
      hours.forEach(h => {
        const d = map[`${day}_${h}`];
        const w = d ? d.avg_w : null;
        const fg = w && (w / maxW >= 0.55) ? 'rgba(255,255,255,0.92)' : 'var(--md-sys-color-on-surface)';
        html += `<td title="${day} ${h}:00 · 均值:${fmt(w)}W" style="background:${colorFor(w)};color:${w ? fg : 'transparent'}">${w ? Math.round(w) : ''}</td>`;
      });
      html += '</tr>';
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
  }
  
  // 引导系统运行
  init();
</script>
</body>
</html>
