services:
  power-monitor:
    build: .
    container_name: xiaomi-power-monitor
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - power-data:/data
    env_file:
      - .env
    environment:
      - COLLECT_INTERVAL=${COLLECT_INTERVAL:-60}
      - DB_PATH=/data/power_data.db
      - RETENTION_DAYS=${RETENTION_DAYS:-0}
      - PORT=8080
      - TZ=Asia/Shanghai

volumes:
  power-data: